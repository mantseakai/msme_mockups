<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win — The Virtual Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ghana-red: #CF0921;
  --ghana-gold: #FCD20E;
  --ghana-green: #006B3F;
  --ghana-black: #000000;
  --bg: #0A0A0A;
  --bg2: #111111;
  --surface: #1A1A1A;
  --surface2: #222222;
  --text: #F0F0F0;
  --muted: #666;
  --win-green: #00FF87;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Animated background grid */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(252,210,14,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(252,210,14,0.04) 1px, transparent 1px);
  background-size: 40px 40px;
  animation: gridMove 20s linear infinite;
  pointer-events:none;
  z-index:0;
}
@keyframes gridMove {
  from { background-position: 0 0; }
  to { background-position: 40px 40px; }
}

/* Glow orbs */
.orb {
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.orb1 { width:300px;height:300px;background:rgba(207,9,33,0.15);top:-50px;left:-50px; }
.orb2 { width:250px;height:250px;background:rgba(0,107,63,0.12);bottom:-50px;right:-50px; }
.orb3 { width:200px;height:200px;background:rgba(252,210,14,0.08);top:50%;left:50%;transform:translate(-50%,-50%); }

.app {
  position:relative;
  z-index:1;
  width:100%;
  max-width:480px;
  padding: 0 0 50px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* Header */
.header {
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 18px 20px 0;
}
.header-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.3rem;
  letter-spacing:0.15em;
  background:linear-gradient(135deg,var(--ghana-gold),var(--ghana-red));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.live-badge {
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(207,9,33,0.15);
  border:1px solid rgba(207,9,33,0.5);
  border-radius:100px;
  padding:5px 12px;
  font-size:0.65rem;
  font-weight:700;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--ghana-red);
}
.live-dot {
  width:7px;height:7px;
  background:var(--ghana-red);
  border-radius:50%;
  animation:livePulse 1s ease-in-out infinite;
}
@keyframes livePulse {
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.4;transform:scale(0.7);}
}

/* Title section */
.title-section {
  text-align:center;
  padding: 16px 20px 0;
}
.title-main {
  font-family:'Bebas Neue',sans-serif;
  font-size:2.8rem;
  letter-spacing:0.08em;
  line-height:1;
  background:linear-gradient(160deg,#fff 0%,var(--ghana-gold) 60%,var(--ghana-red) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.title-sub {
  font-size:0.72rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  color:var(--muted);
  margin-top:2px;
}

/* Stake bar */
.stake-bar {
  width:calc(100% - 32px);
  margin: 14px 16px 0;
  background:var(--surface);
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:12px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.stake-label {
  font-size:0.65rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
}
.stake-controls {
  display:flex;
  align-items:center;
  gap:10px;
}
.stake-btn {
  width:28px;height:28px;
  border:1px solid #333;
  border-radius:50%;
  background:var(--surface2);
  color:var(--text);
  font-size:1rem;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
  font-family:'Syne',sans-serif;
}
.stake-btn:hover { border-color:var(--ghana-gold); color:var(--ghana-gold); }
.stake-amount {
  font-family:'Space Mono',monospace;
  font-size:1rem;
  font-weight:700;
  color:var(--ghana-gold);
  min-width:70px;
  text-align:center;
}
.wallet-info {
  font-size:0.65rem;
  color:var(--muted);
  text-align:right;
}
.wallet-info span {
  color:var(--win-green);
  font-weight:600;
}

/* Wheel area */
.wheel-area {
  position:relative;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:20px;
  padding:0 16px;
}

/* Kente border frame */
.wheel-frame {
  position:relative;
  width:320px;
  height:320px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Decorative kente ring */
.kente-ring {
  position:absolute;
  inset:-14px;
  border-radius:50%;
  background:conic-gradient(
    var(--ghana-red) 0deg 30deg,
    var(--ghana-gold) 30deg 60deg,
    var(--ghana-green) 60deg 90deg,
    var(--ghana-black) 90deg 120deg,
    var(--ghana-red) 120deg 150deg,
    var(--ghana-gold) 150deg 180deg,
    var(--ghana-green) 180deg 210deg,
    var(--ghana-black) 210deg 240deg,
    var(--ghana-red) 240deg 270deg,
    var(--ghana-gold) 270deg 300deg,
    var(--ghana-green) 300deg 330deg,
    var(--ghana-black) 330deg 360deg
  );
  animation: kenteRotate 12s linear infinite;
  box-shadow: 0 0 30px rgba(252,210,14,0.2);
}
@keyframes kenteRotate {
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}
.kente-ring::after {
  content:'';
  position:absolute;
  inset:10px;
  border-radius:50%;
  background:var(--bg);
}

/* Tick marks ring */
.ticks-ring {
  position:absolute;
  inset:-2px;
  border-radius:50%;
  pointer-events:none;
  z-index:3;
}

/* The Wheel Canvas */
.wheel-canvas-wrap {
  position:relative;
  width:300px;
  height:300px;
  z-index:2;
}
#wheelCanvas {
  border-radius:50%;
  display:block;
  filter:drop-shadow(0 0 20px rgba(252,210,14,0.15));
}

/* Wheel center hub */
.wheel-hub {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:46px; height:46px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%, #fff 0%, #ccc 40%, #888 100%);
  border:3px solid #000;
  z-index:6;
  box-shadow: 0 0 0 4px rgba(252,210,14,0.4), 0 4px 15px rgba(0,0,0,0.8);
  display:flex;align-items:center;justify-content:center;
}
.hub-inner {
  width:18px;height:18px;
  border-radius:50%;
  background:var(--bg);
  border:2px solid #444;
}

/* Pointer/arrow */
.wheel-pointer {
  position:absolute;
  top: -18px;
  left:50%;
  transform:translateX(-50%);
  z-index:7;
  width:0;
  filter:drop-shadow(0 2px 8px rgba(207,9,33,0.8));
}
.wheel-pointer svg {
  display:block;
}

/* Spin button / lever */
.spin-section {
  width:calc(100% - 32px);
  margin: 20px 16px 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.spin-btn {
  width:100%;
  padding:0;
  background:none;
  border:none;
  cursor:pointer;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.spin-btn-inner {
  width:100%;
  padding:20px;
  background:linear-gradient(135deg,var(--ghana-red) 0%,#8B0000 100%);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  font-family:'Bebas Neue',sans-serif;
  font-size:1.6rem;
  letter-spacing:0.12em;
  color:white;
  transition:all 0.2s;
  box-shadow: 0 8px 0 #5a0000, 0 12px 30px rgba(207,9,33,0.4);
  position:relative;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}
.spin-btn-inner::before {
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
  transition:left 0.5s;
}
.spin-btn:hover .spin-btn-inner::before { left:100%; }
.spin-btn:hover .spin-btn-inner {
  box-shadow: 0 10px 0 #5a0000, 0 16px 40px rgba(207,9,33,0.5);
  transform:translateY(-2px);
}
.spin-btn:active .spin-btn-inner {
  box-shadow: 0 2px 0 #5a0000, 0 4px 15px rgba(207,9,33,0.3);
  transform:translateY(6px);
}
.spin-btn.spinning .spin-btn-inner {
  background:linear-gradient(135deg,#333,#222);
  box-shadow: 0 4px 0 #111, 0 6px 20px rgba(0,0,0,0.4);
  transform:translateY(4px);
  cursor:not-allowed;
}
.spin-icon {
  font-size:1.8rem;
  animation:none;
}
.spin-btn.spinning .spin-icon {
  animation: spinIcon 0.4s linear infinite;
}
@keyframes spinIcon {
  from{transform:rotate(0);}
  to{transform:rotate(360deg);}
}

/* Swipe hint */
.swipe-hint {
  display:flex;
  align-items:center;
  gap:8px;
  font-size:0.65rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:var(--muted);
}
.swipe-arrow {
  animation: swipeAnim 1.5s ease-in-out infinite;
}
@keyframes swipeAnim {
  0%,100%{transform:translateX(0);opacity:0.4;}
  50%{transform:translateX(6px);opacity:1;}
}

/* Result panel */
.result-panel {
  width:calc(100% - 32px);
  margin:16px 16px 0;
  background:var(--surface);
  border:1px solid #2a2a2a;
  border-radius:16px;
  padding:20px;
  text-align:center;
  min-height:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  transition:border-color 0.3s;
}
.result-panel.win {
  border-color:var(--win-green);
  box-shadow:0 0 30px rgba(0,255,135,0.15);
}
.result-panel.lose {
  border-color:#333;
}
.result-idle {
  color:var(--muted);
  font-size:0.8rem;
  letter-spacing:0.1em;
}
.result-multiplier {
  font-family:'Bebas Neue',sans-serif;
  font-size:3.5rem;
  letter-spacing:0.05em;
  display:none;
  animation: resultPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes resultPop {
  0%{transform:scale(0.3);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.result-label {
  font-size:0.65rem;
  letter-spacing:0.2em;
  text-transform:uppercase;
  display:none;
  margin-bottom:4px;
}
.result-payout {
  font-family:'Space Mono',monospace;
  font-size:2rem;
  font-weight:700;
  color:var(--win-green);
  display:none;
  animation: payoutFlash 0.3s ease infinite alternate;
}
@keyframes payoutFlash {
  from{opacity:1;}
  to{opacity:0.5;}
}
.result-payout.still { animation:none; }
.instant-win-badge {
  background:linear-gradient(135deg,var(--win-green),#00c46a);
  color:#000;
  font-family:'Bebas Neue',sans-serif;
  font-size:1rem;
  letter-spacing:0.15em;
  padding:6px 20px;
  border-radius:100px;
  display:none;
  margin-top:8px;
  animation: badgePop 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s both;
}
@keyframes badgePop {
  0%{transform:scale(0);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.bust-label {
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem;
  color:var(--ghana-red);
  display:none;
  animation:resultPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}

/* Confetti */
.confetti-wrap {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:100;
  overflow:hidden;
}
.confetti-piece {
  position:absolute;
  top:-20px;
  width:10px;
  height:10px;
  opacity:0;
  animation:confettiFall var(--dur) ease-in var(--delay) forwards;
}
@keyframes confettiFall {
  0%{opacity:1;transform:translateY(0) rotate(0deg) translateX(0);}
  100%{opacity:0;transform:translateY(100vh) rotate(720deg) translateX(var(--drift));}
}

/* Spin blur overlay on canvas */
#wheelCanvas.spinning-blur {
  filter:drop-shadow(0 0 30px rgba(252,210,14,0.4));
}

/* Segment legend */
.legend {
  width:calc(100% - 32px);
  margin:14px 16px 0;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}
.legend-item {
  background:var(--surface);
  border:1px solid #2a2a2a;
  border-radius:8px;
  padding:8px 4px;
  text-align:center;
  transition:border-color 0.3s;
}
.legend-item.highlight {
  border-color:var(--ghana-gold);
  background:rgba(252,210,14,0.08);
}
.legend-dot {
  width:10px;height:10px;
  border-radius:2px;
  margin:0 auto 4px;
}
.legend-val {
  font-family:'Space Mono',monospace;
  font-size:0.68rem;
  font-weight:700;
  color:var(--text);
}

/* History strip */
.history-strip {
  width:calc(100% - 32px);
  margin:14px 16px 0;
  display:flex;
  align-items:center;
  gap:8px;
  overflow:hidden;
}
.history-label {
  font-size:0.6rem;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--muted);
  white-space:nowrap;
  flex-shrink:0;
}
.history-pills {
  display:flex;
  gap:5px;
  overflow-x:auto;
  scrollbar-width:none;
}
.history-pills::-webkit-scrollbar{display:none;}
.h-pill {
  flex-shrink:0;
  padding:3px 9px;
  border-radius:100px;
  font-family:'Space Mono',monospace;
  font-size:0.62rem;
  font-weight:700;
  border:1px solid transparent;
}

/* Audio context toggle */
.audio-toggle {
  position:fixed;
  top:16px;right:16px;
  z-index:50;
  background:var(--surface);
  border:1px solid #333;
  border-radius:50%;
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  font-size:1rem;
  transition:all 0.2s;
  color:var(--muted);
}
.audio-toggle:hover { border-color:var(--ghana-gold); color:var(--ghana-gold); }
.audio-toggle.on { color:var(--ghana-gold); border-color:rgba(252,210,14,0.4); }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="confetti-wrap" id="confettiWrap"></div>
<div class="audio-toggle on" id="audioToggle" title="Toggle Sound" onclick="toggleAudio()">🔊</div>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">NLA · Spin & Win</div>
    <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  </div>

  <!-- Title -->
  <div class="title-section">
    <div class="title-main">The Virtual Wheel</div>
    <div class="title-sub">Spin · Win · Instant Payout</div>
  </div>

  <!-- Stake bar -->
  <div class="stake-bar">
    <div>
      <div class="stake-label">Your Stake</div>
      <div class="stake-controls" style="margin-top:4px">
        <button class="stake-btn" onclick="changeStake(-1)">−</button>
        <div class="stake-amount" id="stakeDisplay">GHS 5.00</div>
        <button class="stake-btn" onclick="changeStake(1)">+</button>
      </div>
    </div>
    <div>
      <div class="wallet-info">Wallet Balance</div>
      <div class="wallet-info" style="font-size:0.85rem;font-weight:700;color:var(--win-green);margin-top:2px">
        <span id="walletDisplay">GHS 120.00</span>
      </div>
    </div>
  </div>

  <!-- Wheel -->
  <div class="wheel-area">
    <div class="wheel-frame">
      <div class="kente-ring"></div>

      <!-- Pointer arrow -->
      <div class="wheel-pointer">
        <svg width="28" height="24" viewBox="0 0 28 24" fill="none">
          <polygon points="14,22 0,0 28,0" fill="#CF0921" stroke="#000" stroke-width="1.5"/>
          <polygon points="14,18 4,2 24,2" fill="#FF2040" opacity="0.6"/>
        </svg>
      </div>

      <div class="wheel-canvas-wrap">
        <canvas id="wheelCanvas" width="300" height="300"></canvas>
        <div class="wheel-hub">
          <div class="hub-inner"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Spin button -->
  <div class="spin-section">
    <button class="spin-btn" id="spinBtn" onclick="startSpin()">
      <div class="spin-btn-inner">
        <span class="spin-icon">⚡</span>
        <span id="spinBtnText">SWIPE TO SPIN</span>
        <span class="spin-icon">⚡</span>
      </div>
    </button>
    <div class="swipe-hint">
      <span>Tap to spin the wheel</span>
      <span class="swipe-arrow">▶▶</span>
    </div>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="resultPanel">
    <div class="result-idle" id="resultIdle">Spin the wheel to reveal your multiplier</div>
    <div class="result-label" id="resultLabel">Multiplier</div>
    <div class="result-multiplier" id="resultMultiplier"></div>
    <div class="result-payout" id="resultPayout"></div>
    <div class="instant-win-badge" id="instantWinBadge">✦ Instant Win — Credited to Account ✦</div>
    <div class="bust-label" id="bustLabel">Better Luck Next Time!</div>
  </div>

  <!-- Legend -->
  <div class="legend" id="legend"></div>

  <!-- History -->
  <div class="history-strip">
    <div class="history-label">Recent</div>
    <div class="history-pills" id="historyPills"></div>
  </div>

</div>

<script>
// ── Wheel config ───────────────────────────────────────────
const SEGMENTS = [
  { label:'x0',   mult:0,     color:'#1a1a1a',  text:'#555',    kente:'#333' },
  { label:'x1',   mult:1,     color:'#006B3F',  text:'#7DFFBD', kente:'#004d2d' },
  { label:'x0.5', mult:0.5,   color:'#222222',  text:'#aaa',    kente:'#333' },
  { label:'x2',   mult:2,     color:'#CF0921',  text:'#FFB3BC', kente:'#8B0000' },
  { label:'x0.25',mult:0.25,  color:'#1a1a1a',  text:'#666',    kente:'#333' },
  { label:'x3',   mult:3,     color:'#FCD20E',  text:'#5A4000', kente:'#D4A800' },
  { label:'x0',   mult:0,     color:'#1a1a1a',  text:'#555',    kente:'#333' },
  { label:'x1',   mult:1,     color:'#006B3F',  text:'#7DFFBD', kente:'#004d2d' },
  { label:'x0.5', mult:0.5,   color:'#222222',  text:'#aaa',    kente:'#333' },
  { label:'x5',   mult:5,     color:'#FCD20E',  text:'#3A2800', kente:'#D4A800' },
  { label:'x0.25',mult:0.25,  color:'#1a1a1a',  text:'#666',    kente:'#333' },
  { label:'x2',   mult:2,     color:'#CF0921',  text:'#FFB3BC', kente:'#8B0000' },
];
const NUM_SEG = SEGMENTS.length;
const SEG_ANGLE = (2 * Math.PI) / NUM_SEG;

const legendData = [
  { label:'x0',    color:'#333' },
  { label:'x0.25', color:'#444' },
  { label:'x0.5',  color:'#555' },
  { label:'x1',    color:'#006B3F' },
  { label:'x2',    color:'#CF0921' },
  { label:'x3',    color:'#FCD20E' },
  { label:'x5',    color:'#FCD20E' },
];

// ── State ────────────────────────────────────────────────
let rotation = 0;
let isSpinning = false;
let stakeLevel = 2; // index
const STAKES = [1, 2, 5, 10, 20, 50, 100];
let wallet = 120;
let audioEnabled = true;
let history = [];
let audioCtx = null;

// ── Audio ────────────────────────────────────────────────
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTick(freq = 600, dur = 0.03) {
  if (!audioEnabled) return;
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = freq;
    o.type = 'square';
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + dur);
  } catch(e){}
}
function playWin() {
  if (!audioEnabled) return;
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f;
      o.type = 'sine';
      const t = ctx.currentTime + i * 0.1;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.12, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      o.start(t); o.stop(t + 0.35);
    });
  } catch(e){}
}
function playBust() {
  if (!audioEnabled) return;
  try {
    const ctx = getAudioCtx();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 200;
    o.type = 'sawtooth';
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    o.start(ctx.currentTime);
    o.stop(ctx.currentTime + 0.6);
  } catch(e){}
}
function toggleAudio() {
  audioEnabled = !audioEnabled;
  const el = document.getElementById('audioToggle');
  el.textContent = audioEnabled ? '🔊' : '🔇';
  el.classList.toggle('on', audioEnabled);
}

// ── Canvas draw ──────────────────────────────────────────
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const CX = 150, CY = 150, R = 148;

function drawKentePattern(ctx, cx, cy, r1, r2, startAngle, endAngle, color) {
  // Draw geometric kente-inspired stripes
  const steps = 4;
  const angleStep = (endAngle - startAngle) / steps;
  for (let i = 0; i < steps; i++) {
    const a1 = startAngle + i * angleStep;
    const a2 = startAngle + (i + 0.5) * angleStep;
    ctx.beginPath();
    ctx.moveTo(cx + r1 * Math.cos(a1), cy + r1 * Math.sin(a1));
    ctx.arc(cx, cy, r1, a1, a2);
    ctx.lineTo(cx + r2 * Math.cos(a2), cy + r2 * Math.sin(a2));
    ctx.arc(cx, cy, r2, a2, a1, true);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
}

function drawWheel(rot) {
  ctx.clearRect(0, 0, 300, 300);

  for (let i = 0; i < NUM_SEG; i++) {
    const seg = SEGMENTS[i];
    const start = rot + i * SEG_ANGLE - Math.PI / 2;
    const end   = start + SEG_ANGLE;

    // Base segment
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.arc(CX, CY, R, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Kente pattern band (outer ring)
    drawKentePattern(ctx, CX, CY, R * 0.72, R * 0.94, start, end, seg.kente);

    // Geometric border diamonds
    const midAngle = start + SEG_ANGLE / 2;
    const dr = R * 0.85;
    const dx = CX + dr * Math.cos(midAngle);
    const dy = CY + dr * Math.sin(midAngle);
    ctx.save();
    ctx.translate(dx, dy);
    ctx.rotate(midAngle + Math.PI/4);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillRect(-4,-4,8,8);
    ctx.restore();

    // Separator radial lines (decorative)
    ctx.beginPath();
    ctx.moveTo(CX + R * 0.72 * Math.cos(start), CY + R * 0.72 * Math.sin(start));
    ctx.lineTo(CX + R * Math.cos(start), CY + R * Math.sin(start));
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Text label
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(start + SEG_ANGLE / 2);
    ctx.translate(R * 0.5, 0);
    ctx.fillStyle = seg.text;
    ctx.font = `bold ${seg.mult >= 3 ? 18 : 15}px 'Space Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 4;
    ctx.fillText(seg.label, 0, 0);
    ctx.restore();
  }

  // Inner circle
  ctx.beginPath();
  ctx.arc(CX, CY, R * 0.22, 0, 2 * Math.PI);
  ctx.fillStyle = '#0A0A0A';
  ctx.fill();
  ctx.strokeStyle = 'rgba(252,210,14,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner kente ring pattern
  for (let i = 0; i < 12; i++) {
    const a = rot + (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(CX + R*0.22*Math.cos(a), CY + R*0.22*Math.sin(a));
    ctx.lineTo(CX + R*0.36*Math.cos(a), CY + R*0.36*Math.sin(a));
    ctx.strokeStyle = i%3===0 ? 'rgba(252,210,14,0.4)' : i%3===1 ? 'rgba(207,9,33,0.3)' : 'rgba(0,107,63,0.3)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

// ── Legend build ─────────────────────────────────────────
const legendEl = document.getElementById('legend');
legendData.forEach(d => {
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.id = 'leg-' + d.label.replace('.','_');
  item.innerHTML = `<div class="legend-dot" style="background:${d.color}"></div><div class="legend-val">${d.label}</div>`;
  legendEl.appendChild(item);
});

// ── Stake controls ───────────────────────────────────────
function changeStake(dir) {
  stakeLevel = Math.max(0, Math.min(STAKES.length - 1, stakeLevel + dir));
  document.getElementById('stakeDisplay').textContent = `GHS ${STAKES[stakeLevel].toFixed(2)}`;
}

// ── Spin logic ───────────────────────────────────────────
function getSegmentAtTop(rot) {
  // The pointer is at the top (270° = -π/2)
  // Normalize rotation
  let angle = ((-rot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  let seg = Math.floor(angle / SEG_ANGLE) % NUM_SEG;
  return seg;
}

function startSpin() {
  if (isSpinning) return;
  const stake = STAKES[stakeLevel];
  if (stake > wallet) { showToast('Insufficient wallet balance!'); return; }

  wallet -= stake;
  updateWallet();

  isSpinning = true;
  const btn = document.getElementById('spinBtn');
  btn.classList.add('spinning');
  document.getElementById('spinBtnText').textContent = 'SPINNING...';

  // Reset result
  hideResult();

  // Target segment (weighted towards non-zero for fun)
  const weights = SEGMENTS.map(s => s.mult === 0 ? 8 : s.mult === 0.25 ? 10 : s.mult === 0.5 ? 12 : s.mult === 1 ? 15 : s.mult === 2 ? 12 : s.mult === 3 ? 8 : 3);
  const totalW = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * totalW;
  let targetSeg = 0;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) { targetSeg = i; break; } }

  // Calculate target rotation: pointer at top (-π/2), segment i starts at i*SEG_ANGLE
  // We want segment targetSeg's middle to be at -π/2 (top)
  const targetAngle = -(targetSeg * SEG_ANGLE + SEG_ANGLE / 2);
  const fullSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const endRotation = fullSpins + targetAngle - (rotation % (2*Math.PI)) + (rotation % (2*Math.PI) < 0 ? 2*Math.PI : 0);
  const totalRotation = rotation + fullSpins + ((targetAngle - rotation) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);

  // Actually just aim for full rotations + offset
  const finalRot = rotation - (rotation % (2*Math.PI)) + fullSpins + ((-targetAngle % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);

  const duration = 4000 + Math.random() * 1500;
  const startTime = performance.now();
  const startRot = rotation;

  let lastTickAngle = 0;
  let tickInterval = 200;

  function easeOut(t) {
    return 1 - Math.pow(1 - t, 3.5);
  }

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const eased = easeOut(progress);

    rotation = startRot + (finalRot - startRot) * eased;
    drawWheel(rotation);

    // Tick sound — increases in tempo early, slows down at end
    const speed = (finalRot - startRot) * (1 - progress) / duration * 1000;
    const angularVel = Math.abs(speed);
    const currentAngle = rotation % (2 * Math.PI / NUM_SEG);
    if (Math.abs(currentAngle - lastTickAngle) > (angularVel > 1 ? 0.35 : 0.52)) {
      playTick(400 + angularVel * 40, 0.025);
      lastTickAngle = currentAngle;
    }

    // Blur effect during fast spin
    if (progress < 0.6) {
      canvas.style.filter = `blur(${Math.min(3, angularVel * 0.8)}px) drop-shadow(0 0 25px rgba(252,210,14,0.4))`;
    } else {
      canvas.style.filter = 'drop-shadow(0 0 15px rgba(252,210,14,0.2))';
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      rotation = finalRot;
      drawWheel(rotation);
      canvas.style.filter = 'drop-shadow(0 0 10px rgba(252,210,14,0.15))';
      isSpinning = false;
      btn.classList.remove('spinning');
      document.getElementById('spinBtnText').textContent = 'SWIPE TO SPIN';
      showResult(targetSeg, stake);
    }
  }

  requestAnimationFrame(animate);
}

function showResult(segIdx, stake) {
  const seg = SEGMENTS[segIdx];
  const payout = stake * seg.mult;

  // Highlight legend
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('highlight'));
  const legKey = 'leg-' + seg.label.replace('.','_');
  const legEl = document.getElementById(legKey);
  if (legEl) legEl.classList.add('highlight');

  const panel = document.getElementById('resultPanel');
  document.getElementById('resultIdle').style.display = 'none';

  if (seg.mult === 0) {
    // Bust
    panel.classList.remove('win');
    panel.classList.add('lose');
    document.getElementById('bustLabel').style.display = 'block';
    document.getElementById('resultMultiplier').style.display = 'block';
    document.getElementById('resultMultiplier').textContent = 'x0';
    document.getElementById('resultMultiplier').style.color = '#555';
    playBust();
    addHistory(seg.label, false);
  } else {
    wallet += payout;
    updateWallet();
    panel.classList.add('win');
    panel.classList.remove('lose');
    const multEl = document.getElementById('resultMultiplier');
    const payEl = document.getElementById('resultPayout');
    const badgeEl = document.getElementById('instantWinBadge');
    const labelEl = document.getElementById('resultLabel');

    labelEl.style.display = 'block';
    multEl.style.display = 'block';
    multEl.textContent = seg.label;
    multEl.style.color = seg.mult >= 3 ? '#FCD20E' : seg.mult >= 1 ? '#00FF87' : '#aaa';

    payEl.style.display = 'block';
    payEl.textContent = `+ GHS ${payout.toFixed(2)}`;

    setTimeout(() => {
      payEl.classList.add('still');
      badgeEl.style.display = 'inline-block';
    }, 1500);

    playWin();
    if (seg.mult >= 2) spawnConfetti();
    addHistory(seg.label, true);
  }
}

function hideResult() {
  const panel = document.getElementById('resultPanel');
  panel.classList.remove('win','lose');
  document.getElementById('resultIdle').style.display = 'block';
  document.getElementById('resultMultiplier').style.display = 'none';
  document.getElementById('resultPayout').style.display = 'none';
  document.getElementById('resultPayout').classList.remove('still');
  document.getElementById('instantWinBadge').style.display = 'none';
  document.getElementById('bustLabel').style.display = 'none';
  document.getElementById('resultLabel').style.display = 'none';
  document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('highlight'));
}

function updateWallet() {
  document.getElementById('walletDisplay').textContent = `GHS ${wallet.toFixed(2)}`;
}

// ── History ──────────────────────────────────────────────
const pillColors = {
  'x0':   { bg:'#2a2a2a', color:'#666', border:'#333' },
  'x0.25':{ bg:'#2a2a2a', color:'#888', border:'#444' },
  'x0.5': { bg:'#2a2a2a', color:'#aaa', border:'#555' },
  'x1':   { bg:'rgba(0,107,63,0.2)', color:'#7DFFBD', border:'rgba(0,107,63,0.5)' },
  'x2':   { bg:'rgba(207,9,33,0.2)', color:'#FFB3BC', border:'rgba(207,9,33,0.5)' },
  'x3':   { bg:'rgba(252,210,14,0.2)', color:'#FCD20E', border:'rgba(252,210,14,0.5)' },
  'x5':   { bg:'rgba(252,210,14,0.3)', color:'#FFD700', border:'rgba(252,210,14,0.8)' },
};
function addHistory(label, isWin) {
  history.unshift({ label, isWin });
  if (history.length > 12) history.pop();
  renderHistory();
}
function renderHistory() {
  const el = document.getElementById('historyPills');
  el.innerHTML = history.map(h => {
    const c = pillColors[h.label] || pillColors['x0'];
    return `<div class="h-pill" style="background:${c.bg};color:${c.color};border-color:${c.border}">${h.label}</div>`;
  }).join('');
}

// ── Confetti ─────────────────────────────────────────────
function spawnConfetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#CF0921','#FCD20E','#006B3F','#fff','#FF6B6B','#FFD700'];
  const shapes = ['50%','2px','0'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    const color = colors[Math.floor(Math.random() * colors.length)];
    const size = Math.random() * 8 + 5;
    const drift = (Math.random() * 200 - 100) + 'px';
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px; height:${size}px;
      background:${color};
      border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
      --dur:${Math.random()*1.5+1.5}s;
      --delay:${Math.random()*0.5}s;
      --drift:${drift};
    `;
    wrap.appendChild(p);
  }
  setTimeout(() => { wrap.innerHTML = ''; }, 3000);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#222;border:1px solid #444;color:#fff;font-family:Syne,sans-serif;font-size:0.82rem;padding:12px 24px;border-radius:100px;z-index:200;white-space:nowrap;letter-spacing:0.08em;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ── Init ─────────────────────────────────────────────────
drawWheel(rotation);
